name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
          - os: ubuntu-latest
            target: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Install Linux system dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            ninja-build \
            cmake \
            pkg-config \
            libblkid-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format generated code
        run: dart format lib/ test/

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Build (macOS)
        if: matrix.target == 'macos'
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: ""
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: NO
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: NO

      - name: Build
        if: matrix.target != 'macos'
        run: flutter build ${{ matrix.target }} --release

      - name: Upload artifact (macOS)
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: codebench-macos
          path: build/macos/Build/Products/Release/code_bench.app

      - name: Upload artifact (Windows)
        if: matrix.target == 'windows'

        uses: actions/upload-artifact@v4
        with:
          name: codebench-windows
          path: build/windows/x64/runner/Release/

      - name: Upload artifact (Linux)
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: codebench-linux
          path: build/linux/x64/release/bundle/
