# Builds and publishes a Code Bench release. Two ways it runs:
#
# 1. Automatic (workflow_call) — chained from release-please.yml when a
#    Release Please PR is merged. Builds artifacts, uploads them to the
#    draft release, then PATCHes draft=false to publish (which is what
#    creates the v* git tag). This is the normal path; do nothing.
#
# 2. Manual (workflow_dispatch) — recovery only. Use the "Run workflow"
#    button when the chained run failed mid-way. See the "Recovering a
#    stuck release" section of README.md for Shape A (stuck draft, supply
#    `release_id`) and Shape B (orphaned tag, leave `release_id` blank).
name: Release (build + publish)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. v0.2.0). For published releases, the tag must exist; for drafts, supply release_id below."
        required: true
        type: string
      release_id:
        description: "Optional GitHub release ID. Set when publishing a stuck draft release; leave blank for a normal published-tag rerun."
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      release_id:
        required: true
        type: string
      sha:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            artifact: CodeBench-macos.zip
          # - os: windows-latest
          #   target: windows
          #   artifact: CodeBench-windows.zip
          # - os: ubuntu-latest
          #   target: linux
          #   artifact: CodeBench-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || inputs.tag || github.ref }}

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Install Linux system dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            ninja-build \
            cmake \
            pkg-config \
            libblkid-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting (hand-written files only)
        run: |
          dart format --set-exit-if-changed $(find lib test -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "*.mocks.dart")

      - name: Import Developer ID certificate
        if: matrix.target == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

      - name: Install Developer ID provisioning profile
        if: matrix.target == 'macos'
        env:
          MACOS_PROVISIONING_PROFILE: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        # Required by Xcode 14+ when entitlements include keychain-access-groups
        # (which flutter_secure_storage v10+ needs on macOS 15). Without an
        # installed profile, Xcode pre-build aborts with the misleading
        # "requires a provisioning profile" error even for Developer ID
        # direct distribution. The profile is decoded from a secret and
        # placed in the Xcode-managed directory before the build step.
        run: |
          set -euo pipefail
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          PP_PATH="$PP_DIR/CodeBench.provisionprofile"
          echo "$MACOS_PROVISIONING_PROFILE" | base64 --decode > "$PP_PATH"

          # Verify the profile parses, then print non-sensitive identifying
          # fields to make CI failures self-diagnosing.
          DECODED=$(mktemp)
          security cms -D -i "$PP_PATH" -o "$DECODED"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$DECODED")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$DECODED")
          PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$DECODED")
          rm -f "$DECODED"

          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID, team $PROFILE_TEAM)"
          if [ "$PROFILE_NAME" != "Code Bench Developer ID" ]; then
            echo "::error::Profile name mismatch — expected 'Code Bench Developer ID', got '$PROFILE_NAME'"
            exit 1
          fi

      - name: Build (macOS)
        if: matrix.target == 'macos'
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_CODE_SIGN_STYLE: Manual
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: "Developer ID Application"
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          FLUTTER_XCODE_CODE_SIGN_ENTITLEMENTS: ${{ github.workspace }}/macos/Runner/Release.entitlements
          FLUTTER_XCODE_ENABLE_HARDENED_RUNTIME: "YES"
          FLUTTER_XCODE_OTHER_CODE_SIGN_FLAGS: "--timestamp"
          FLUTTER_XCODE_PROVISIONING_PROFILE_SPECIFIER: "Code Bench Developer ID"

      - name: Notarize and staple
        if: matrix.target == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # Apple's notary queue typically returns in 2-10 min but has been
        # observed to spike past 30 min during peak hours / incidents
        # (see submission 1534dd17 and 08fa45b9). 60 min is the new ceiling
        # — generous for queue tail latencies, still bounded so a stuck
        # runner can't burn an hour of credits silently.
        timeout-minutes: 60
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/Code Bench.app"
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize.zip"

          ditto -c -k --keepParent "$APP" "$NOTARIZE_ZIP"

          # Capture both the JSON output and exit code separately. notarytool
          # returns 0 on Invalid verdicts (only the *submission* succeeded),
          # so we must parse the status field instead of relying on $?.
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json \
            --wait)

          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | jq -r '.id')
          STATUS=$(echo "$SUBMIT_OUTPUT" | jq -r '.status')

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            echo "::group::notarytool log for $SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            echo "::endgroup::"
            exit 1
          fi

          xcrun stapler staple "$APP"
          spctl --assess --type exec --verbose=4 "$APP"

      - name: Build
        if: matrix.target != 'macos'
        run: flutter build ${{ matrix.target }} --release

      - name: Install create-dmg
        if: matrix.target == 'macos'
        run: brew install create-dmg

      - name: Package (macOS)
        if: matrix.target == 'macos'
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/Code Bench.app"
          ZIP="$GITHUB_WORKSPACE/CodeBench-macos.zip"
          cd build/macos/Build/Products/Release
          # ditto (not zip) so the bundle's symlinks and xattrs survive — plain
          # `zip -r` strips both, which corrupts the codesign seal and bricks
          # the in-app auto-updater (it re-verifies codesign after extracting).
          # Mirrors the `ditto -c -k --keepParent` already used for the
          # notarization-upload zip earlier in this job.
          ditto -c -k --keepParent "Code Bench.app" "$ZIP"

          # Round-trip integrity check: extract the just-built zip into a
          # throwaway dir and re-run the same verifications the in-app updater
          # runs on the user's machine. If `zip` ever sneaks back in (or any
          # future packaging change strips xattrs / mangles symlinks), this
          # fails the release here instead of silently shipping a broken zip
          # that bricks every auto-update.
          VERIFY_DIR=$(mktemp -d)
          ditto -x -k "$ZIP" "$VERIFY_DIR"
          codesign --verify --deep --strict "$VERIFY_DIR/Code Bench.app"
          spctl --assess --type execute --verbose=4 "$VERIFY_DIR/Code Bench.app"
          rm -rf "$VERIFY_DIR"

          cd "$GITHUB_WORKSPACE"
          create-dmg \
            --volname "Code Bench" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Code Bench.app" 180 170 \
            --hide-extension "Code Bench.app" \
            --app-drop-link 480 170 \
            "CodeBench-macos.dmg" \
            "$APP"

      - name: Package (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath CodeBench-windows.zip

      - name: Package (Linux)
        if: matrix.target == 'linux'
        run: tar -czf CodeBench-linux.tar.gz -C build/linux/x64/release bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload DMG artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: CodeBench-macos.dmg
          path: CodeBench-macos.dmg

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # workflow_call path: release-please created a draft release with no
      # underlying git tag. Upload assets via the GitHub API using the
      # release_id (tag-based lookup is unreliable for drafts), then PATCH
      # draft=false to publish — this is also what creates the git tag at
      # the release's target_commitish. GITHUB_TOKEN is used so the
      # implicit tag-creation event does NOT recursively trigger workflows.
      - name: Upload assets and publish draft release
        if: inputs.release_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RELEASE_ID: ${{ inputs.release_id }}
        run: |
          set -euo pipefail
          UPLOAD_URL=$(gh api "/repos/$REPO/releases/$RELEASE_ID" --jq '.upload_url' | sed 's/{?name,label}//')

          # Make retries idempotent: delete any existing assets so a re-run
          # after a partially-failed upload does not 422 on duplicate names.
          # Newly-created drafts have no assets, so this is a no-op on the
          # happy path.
          EXISTING=$(gh api "/repos/$REPO/releases/$RELEASE_ID/assets" --jq '.[].id')
          for ASSET_ID in $EXISTING; do
            echo "Deleting existing asset $ASSET_ID..."
            gh api --method DELETE "/repos/$REPO/releases/$RELEASE_ID/assets/$ASSET_ID" >/dev/null
          done

          # When wiring up Windows/Linux platforms, add their artifacts here:
          #   artifacts/CodeBench-windows.zip
          #   artifacts/CodeBench-linux.tar.gz
          for FILE in artifacts/CodeBench-macos.dmg artifacts/CodeBench-macos.zip; do
            [ -f "$FILE" ] || { echo "::error::Missing $FILE"; exit 1; }
            NAME=$(basename "$FILE")
            MIME_TYPE=$(file -b --mime-type "$FILE")
            echo "Uploading $NAME ($MIME_TYPE)..."
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: $MIME_TYPE" \
              --data-binary "@$FILE" \
              "$UPLOAD_URL?name=$NAME" >/dev/null
          done
          echo "Publishing release $RELEASE_ID..."
          gh api --method PATCH "/repos/$REPO/releases/$RELEASE_ID" -F draft=false >/dev/null

      # workflow_dispatch path: tag already exists and is published (manual
      # recovery for a stuck build-and-publish.yml run). softprops finds the existing
      # release by tag and uploads/replaces assets — no draft involved.
      # When wiring up Windows/Linux platforms, add their artifacts to the
      # `files:` block below:
      #   artifacts/CodeBench-windows.zip
      #   artifacts/CodeBench-linux.tar.gz
      - name: Upload release artifacts (manual)
        if: inputs.release_id == ''
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            artifacts/CodeBench-macos.dmg
            artifacts/CodeBench-macos.zip
