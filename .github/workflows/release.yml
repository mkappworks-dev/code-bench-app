name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            artifact: CodeBench-macos.zip
          # - os: windows-latest
          #   target: windows
          #   artifact: CodeBench-windows.zip
          # - os: ubuntu-latest
          #   target: linux
          #   artifact: CodeBench-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Install Linux system dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            ninja-build \
            cmake \
            pkg-config \
            libblkid-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting (hand-written files only)
        run: |
          dart format --set-exit-if-changed $(find lib test -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "*.mocks.dart")

      - name: Import Developer ID certificate
        if: matrix.target == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

      - name: Build (macOS)
        if: matrix.target == 'macos'
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_CODE_SIGN_STYLE: Manual
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: "Developer ID Application"
          FLUTTER_XCODE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          FLUTTER_XCODE_CODE_SIGN_ENTITLEMENTS: ${{ github.workspace }}/macos/Runner/Release.entitlements
          FLUTTER_XCODE_ENABLE_HARDENED_RUNTIME: "YES"
          FLUTTER_XCODE_OTHER_CODE_SIGN_FLAGS: "--timestamp"

      - name: Notarize and staple
        if: matrix.target == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/Code Bench.app"
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize.zip"

          ditto -c -k --keepParent "$APP" "$NOTARIZE_ZIP"

          if ! xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait; then
            SUBMISSION_ID=$(xcrun notarytool history \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json | jq -r '.history[0].id')
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          xcrun stapler staple "$APP"
          spctl --assess --type exec --verbose=4 "$APP"

      - name: Build
        if: matrix.target != 'macos'
        run: flutter build ${{ matrix.target }} --release

      - name: Install create-dmg
        if: matrix.target == 'macos'
        run: brew install create-dmg

      - name: Package (macOS)
        if: matrix.target == 'macos'
        run: |
          APP="build/macos/Build/Products/Release/Code Bench.app"
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/CodeBench-macos.zip" "Code Bench.app"
          cd "$GITHUB_WORKSPACE"
          create-dmg \
            --volname "Code Bench" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Code Bench.app" 180 170 \
            --hide-extension "Code Bench.app" \
            --app-drop-link 480 170 \
            "CodeBench-macos.dmg" \
            "$APP"

      - name: Package (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath CodeBench-windows.zip

      - name: Package (Linux)
        if: matrix.target == 'linux'
        run: tar -czf CodeBench-linux.tar.gz -C build/linux/x64/release bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload DMG artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: CodeBench-macos.dmg
          path: CodeBench-macos.dmg

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Code Bench ${{ github.ref_name }}

            **macOS download:** grab `CodeBench-macos.dmg`, open it, and drag Code Bench to Applications.

            Once installed, the app will check for updates automatically and prompt you when a new version is available.

            ### First launch on macOS
            When you open a project under Documents, Downloads, or Desktop, macOS will ask for permission to read that folder. Click **Allow** when prompted; if the app reports the access was blocked, click Allow on the system dialog and try adding the project again.
          files: |
            artifacts/CodeBench-macos.dmg
            artifacts/CodeBench-macos.zip
            # artifacts/CodeBench-windows.zip
            # artifacts/CodeBench-linux.tar.gz
          generate_release_notes: true
