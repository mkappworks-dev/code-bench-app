name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos
            artifact: CodeBench-macos.zip
          # - os: windows-latest
          #   target: windows
          #   artifact: CodeBench-windows.zip
          # - os: ubuntu-latest
          #   target: linux
          #   artifact: CodeBench-linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.23.0
        with:
          channel: stable

      - name: Install Linux system dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            ninja-build \
            cmake \
            pkg-config \
            libblkid-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting (hand-written files only)
        run: |
          dart format --set-exit-if-changed $(find lib test -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" ! -name "*.mocks.dart")

      - name: Build (macOS)
        if: matrix.target == 'macos'
        run: flutter build macos --release
        env:
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: ""
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: NO
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: NO

      - name: Build
        if: matrix.target != 'macos'
        run: flutter build ${{ matrix.target }} --release

      - name: Package (macOS)
        if: matrix.target == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/CodeBench-macos.zip" "Code Bench.app"

      - name: Package (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath CodeBench-windows.zip

      - name: Package (Linux)
        if: matrix.target == 'linux'
        run: tar -czf CodeBench-linux.tar.gz -C build/linux/x64/release bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CodeBench-macos.zip
            # artifacts/CodeBench-windows.zip
            # artifacts/CodeBench-linux.tar.gz
          generate_release_notes: true
