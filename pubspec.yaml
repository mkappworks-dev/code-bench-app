name: code_bench_app
description: "Desktop AI coding assistant — chat, run tools, and edit files on your local repo"
publish_to: "none"

version: 0.4.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: 3.3.1
  riverpod_annotation: 4.0.2

  # Navigation
  go_router: 17.2.2

  # HTTP & Streaming
  dio: 5.9.2

  # Database
  drift: 2.31.0 # blocked: 2.32.1/drift_flutter 0.3.0 need analyzer >=10.0.0 via drift_dev; riverpod_generator 4.0.3 caps at ^9.0.0
  sqlite3_flutter_libs: 0.5.42 # blocked: 0.6.0+eol needs drift_flutter 0.3.0 which needs analyzer >=10.0.0
  drift_flutter: 0.2.8 # blocked: 0.3.0 needs sqlite3 ^3.0.0, incompatible with drift_dev 2.31.0

  # Secure storage
  flutter_secure_storage: 10.0.0

  # Code generation annotations
  freezed_annotation: 3.1.0
  json_annotation: 4.11.0

  # Code editor
  re_editor: 0.8.0
  re_highlight: 0.0.3

  # Markdown & code highlighting in chat
  flutter_highlight: 0.7.0
  flutter_markdown_plus: 1.0.7

  # OAuth
  flutter_web_auth_2: 5.0.2

  # File system
  path_provider: 2.1.5
  file_picker: 11.0.2
  desktop_drop: 0.7.1
  path: 1.9.1

  # Window management
  window_manager: 0.5.1

  # Utilities
  package_info_plus: 8.3.1 # blocked: 10.1.0 needs win32 ^6.0.1, file_picker 11.0.2 needs win32 ^5.9.0
  uuid: 4.5.3
  collection: 1.19.1
  glob: 2.1.3
  crypto: 3.0.7
  html: ^0.15.4
  diff_match_patch: 0.4.1
  intl: 0.20.2
  rxdart: 0.28.0
  url_launcher: 6.3.2

  # Fonts
  google_fonts: 8.0.2

  # Preferences
  shared_preferences: 2.5.5

  # Icons
  cupertino_icons: 1.0.9
  lucide_icons_flutter: 3.1.13

  # Splash screen
  flutter_native_splash: 2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generators
  build_runner: 2.14.0
  riverpod_generator: 4.0.3
  freezed: 3.2.5
  json_serializable: 6.13.0 # blocked: 6.13.1 needs analyzer >=10.0.0, riverpod_generator 4.0.3 caps at ^9.0.0
  drift_dev: 2.31.0 # blocked: same analyzer conflict as drift

  # Testing
  mockito: 5.6.4

  flutter_lints: 6.0.0

  # App icon
  flutter_launcher_icons: 0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
  linux:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#141414"
  color_dark: "#141414"
  image: "assets/images/app_icon.png"
  android: false
  ios: false
  web: false
